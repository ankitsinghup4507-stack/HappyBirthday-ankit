<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Ankit</title>

<style>
body {
  margin: 0;
  padding: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #1e3c72, #2a5298);
  color: white;
  text-align: center;
  overflow: hidden;
}

/* Floating hearts */
.heart {
  position: absolute;
  color: red;
  animation: float 6s linear infinite;
}

@keyframes float {
  0% { transform: translateY(100vh); opacity: 1; }
  100% { transform: translateY(-10vh); opacity: 0; }
}

/* Main card */
.card {
  margin-top: 80px;
  animation: fadeIn 2s ease-in;
}

@keyframes fadeIn {
  from {opacity:0;}
  to {opacity:1;}
}

h1 {
  font-size: 40px;
}

h2 {
  color: #ffd700;
}

img {
  width: 250px;
  border-radius: 20px;
  margin-top: 20px;
  box-shadow: 0 0 25px rgba(0,0,0,0.5);
}

/* Button */
button {
  margin-top: 20px;
  padding: 12px 25px;
  border: none;
  border-radius: 25px;
  background: #ff4081;
  color: white;
  font-size: 18px;
  cursor: pointer;
}

button:hover {
  background: #ff0055;
}
</style>
</head>

<body>

<div class="card">
  <h1>🎉 Happy Birthday 🎉</h1>
  <h2>Ankit Singh</h2>

  <p id="typing"></p>

  <img src="ankit.jpg" alt="Ankit Photo">

  <br>
  <button onclick="playMusic()">🎵 Play Music</button>
</div>

<audio id="music" src="music.mp3"></audio>

<script>
// Typing effect
const text = "Wishing you a day filled with happiness and a year filled with joy ❤️ Stay blessed bro!";
let i = 0;

function typing() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(typing, 50);
  }
}
typing();

// Music play
function playMusic() {
  document.getElementById("music").play();
}

// Hearts animation
function createHeart() {
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "❤️";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = Math.random() * 20 + 10 + "px";

  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 6000);
}

setInterval(createHeart, 300);
</script>

</body>
</html>
